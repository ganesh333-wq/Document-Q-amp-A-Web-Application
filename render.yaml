services:
  - type: web
    name: document-qa-web-application
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: bash start-render.sh
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
